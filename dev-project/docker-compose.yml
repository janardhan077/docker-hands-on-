# ============================================================
#  ShopDash — Docker Compose (Multi-Stage)
#  Services: frontend (nginx) · backend (node) · mongo · mongo-express
#
#  Usage:
#    docker compose up --build          # first run
#    docker compose up -d               # detached
#    docker compose down -v             # stop + remove volumes
# ============================================================

version: "3.9"

# ── Named volumes ────────────────────────────────────────────
volumes:
  mongo_data:        # Persists MongoDB data between restarts
  mongo_config:      # Persists MongoDB config

# ── Networks ─────────────────────────────────────────────────
networks:
  frontend_net:      # frontend ↔ backend only
  backend_net:       # backend ↔ mongo only (never exposed to browser)

# ── Services ─────────────────────────────────────────────────
services:

  # ── 1. MongoDB ─────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: shopdash_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-shopdash}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-shoppassword}
      MONGO_INITDB_DATABASE:      shopdash
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
      - ./mongo-init/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    # ⚠️  Do NOT expose port 27017 in production — internal only
    # ports:
    #   - "27017:27017"   # uncomment for local dev debugging only

  # ── 2. Mongo Express (DB GUI — dev only) ───────────────────
  mongo-express:
    image: mongo-express:1.0.2
    container_name: shopdash_mongoexpress
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-shopdash}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASS:-shoppassword}
      ME_CONFIG_MONGODB_URL:           mongodb://${MONGO_ROOT_USER:-shopdash}:${MONGO_ROOT_PASS:-shoppassword}@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME:    ${MEXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD:    ${MEXPRESS_PASS:-adminpass}
    ports:
      - "8081:8081"    # Browse DB at http://localhost:8081
    networks:
      - backend_net
    profiles:
      - dev            # Only starts when: docker compose --profile dev up

  # ── 3. Backend (Node.js + Express) ─────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      target:     runner          # Use production stage
    container_name: shopdash_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV:    production
      PORT:        5000
      MONGO_URI:   mongodb://${MONGO_ROOT_USER:-shopdash}:${MONGO_ROOT_PASS:-shoppassword}@mongo:27017/shopdash?authSource=admin
      JWT_SECRET:  ${JWT_SECRET:-changeme_use_strong_secret_in_production}
    networks:
      - frontend_net
      - backend_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 4
      start_period: 15s
    # ⚠️  Don't expose 5000 in production — nginx proxies internally
    # ports:
    #   - "5000:5000"   # uncomment for local API testing only
    deploy:
      resources:
        limits:
          cpus:   "0.75"
          memory: 512M

  # ── 4. Frontend (React + Nginx) ────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      target:     runner          # Use production nginx stage
    container_name: shopdash_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"        # Main app → http://localhost
      - "443:443"      # HTTPS (attach cert volume for prod)
    networks:
      - frontend_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 20s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus:   "0.25"
          memory: 128M

  # ── 5. Seed Runner (one-shot init) ─────────────────────────
  seed:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      target:     builder         # Needs all devDeps for seed script
    container_name: shopdash_seed
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-shopdash}:${MONGO_ROOT_PASS:-shoppassword}@mongo:27017/shopdash?authSource=admin
    command: node seed.js
    networks:
      - backend_net
    restart: "no"                 # Run once and exit
    profiles:
      - seed                      # Only runs when: docker compose --profile seed up seed
