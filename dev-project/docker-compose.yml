

version: "3.9"

volumes:
  mongo_data:        
  mongo_config:     


networks:
  frontend_net:     
  backend_net:       


services:

 
  mongo:
    image: mongo:7.0
    container_name: shopdash_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-shopdash}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-shoppassword}
      MONGO_INITDB_DATABASE:      shopdash
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
      - ./mongo-init/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    
  mongo-express:
    image: mongo-express:1.0.2
    container_name: shopdash_mongoexpress
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-shopdash}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASS:-shoppassword}
      ME_CONFIG_MONGODB_URL:           mongodb://${MONGO_ROOT_USER:-shopdash}:${MONGO_ROOT_PASS:-shoppassword}@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME:    ${MEXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD:    ${MEXPRESS_PASS:-adminpass}
    ports:
      - "8081:8081"    
    networks:
      - backend_net
    profiles:
      - dev           

 
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      target:     runner          e
    container_name: shopdash_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV:    production
      PORT:        5000
      MONGO_URI:   mongodb://${MONGO_ROOT_USER:-shopdash}:${MONGO_ROOT_PASS:-shoppassword}@mongo:27017/shopdash?authSource=admin
      JWT_SECRET:  ${JWT_SECRET:-changeme_use_strong_secret_in_production}
    networks:
      - frontend_net
      - backend_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 4
      start_period: 15s
    
    deploy:
      resources:
        limits:
          cpus:   "0.75"
          memory: 512M

  
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      target:     runner          
    container_name: shopdash_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"       
      - "443:443"     
    networks:
      - frontend_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 20s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus:   "0.25"
          memory: 128M

  
  seed:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      target:     builder         
    container_name: shopdash_seed
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-shopdash}:${MONGO_ROOT_PASS:-shoppassword}@mongo:27017/shopdash?authSource=admin
    command: node seed.js
    networks:
      - backend_net
    restart: "no"                
    profiles:
      - seed                      
