<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookMyShow Clone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red:    #e03131;
      --dark:   #0f0f0f;
      --card:   #1a1a1a;
      --border: #2a2a2a;
      --muted:  #888;
      --white:  #f5f5f5;
      --gold:   #f5a623;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--dark); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    /* NAV */
    nav { background: #111; border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; gap: 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--red); letter-spacing: -0.5px; }
    .nav-search { flex: 1; max-width: 400px; }
    .nav-search input { width: 100%; background: var(--border); border: none; border-radius: 8px; padding: 8px 14px; color: var(--white); font-family: inherit; font-size: 0.9rem; outline: none; }
    .nav-search input::placeholder { color: var(--muted); }
    .nav-city { margin-left: auto; color: var(--muted); font-size: 0.85rem; cursor: pointer; }
    .nav-city span { color: var(--red); }

    /* HERO */
    .hero { background: linear-gradient(135deg, #1a0a0a 0%, #0f0f0f 100%); padding: 3rem 2rem 2rem; text-align: center; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.5rem); background: linear-gradient(90deg, var(--red), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero p { color: var(--muted); margin-top: 0.5rem; font-size: 1rem; }

    /* HEALTH BANNER */
    #health-banner { display: none; padding: 0.5rem 2rem; font-size: 0.8rem; text-align: center; }
    #health-banner.ok  { background: #1a3a1a; color: #4ade80; display: block; }
    #health-banner.err { background: #3a1a1a; color: #f87171; display: block; }

    /* SECTION */
    .section { padding: 2rem; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .section-header h2 { font-size: 1.25rem; font-weight: 600; }
    .section-header a { color: var(--red); font-size: 0.85rem; text-decoration: none; cursor: pointer; }

    /* MOVIE GRID */
    .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.5rem; }
    .movie-card { background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border: 1px solid var(--border); }
    .movie-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(224,49,49,0.15); }
    .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
    .movie-card-body { padding: 0.75rem; }
    .movie-card-title { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .movie-card-meta  { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }
    .rating-badge { display: inline-block; background: var(--gold); color: #000; font-size: 0.7rem; font-weight: 700; padding: 2px 7px; border-radius: 4px; margin-top: 0.3rem; }

    /* MODAL OVERLAY */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; overflow-y: auto; padding: 2rem; }
    .overlay.open { display: flex; align-items: flex-start; justify-content: center; }
    .modal { background: var(--card); border-radius: 16px; width: 100%; max-width: 700px; border: 1px solid var(--border); animation: slideUp 0.25s ease; }
    @keyframes slideUp { from { transform: translateY(30px); opacity:0; } to { transform: translateY(0); opacity:1; } }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); }
    .modal-header h3 { font-size: 1.1rem; font-weight: 600; }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 1.5rem; cursor: pointer; line-height: 1; }
    .modal-body { padding: 1.5rem; }

    /* SHOWS LIST */
    .show-date-group { margin-bottom: 1.5rem; }
    .show-date-label { font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
    .theatre-block { background: #111; border-radius: 10px; padding: 1rem; margin-bottom: 0.75rem; border: 1px solid var(--border); }
    .theatre-name { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.5rem; }
    .theatre-address { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.75rem; }
    .show-times { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .show-time-btn { background: none; border: 1px solid var(--red); color: var(--red); padding: 6px 14px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; font-family: inherit; transition: background 0.15s; }
    .show-time-btn:hover { background: var(--red); color: #fff; }

    /* SEAT PICKER */
    .seat-legend { display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .seat-legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.75rem; color: var(--muted); }
    .seat-dot { width: 14px; height: 14px; border-radius: 3px; }
    .seat-dot.available   { background: #2a2a2a; border: 1px solid #555; }
    .seat-dot.selected    { background: var(--red); }
    .seat-dot.booked      { background: #333; opacity: 0.4; }
    .seat-dot.premium     { background: #2a1f00; border: 1px solid var(--gold); }
    .seat-dot.recliner    { background: #1a002a; border: 1px solid #b67fff; }
    .screen-label { text-align: center; color: var(--muted); font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 1rem; border-top: 2px solid var(--muted); padding-top: 0.4rem; }
    .seat-grid-wrapper { overflow-x: auto; }
    .seat-row { display: flex; align-items: center; gap: 4px; margin-bottom: 4px; justify-content: center; }
    .seat-row-label { width: 20px; font-size: 0.7rem; color: var(--muted); text-align: center; flex-shrink: 0; }
    .seat { width: 28px; height: 28px; border-radius: 5px 5px 2px 2px; cursor: pointer; border: none; transition: background 0.1s, transform 0.1s; flex-shrink: 0; }
    .seat.regular  { background: #2a2a2a; }
    .seat.premium  { background: #2a1f00; border: 1px solid var(--gold); }
    .seat.recliner { background: #1a002a; border: 1px solid #b67fff; }
    .seat.booked   { background: #1f1f1f; cursor: not-allowed; opacity: 0.4; }
    .seat.selected { background: var(--red) !important; transform: scale(1.1); }
    .seat:not(.booked):hover { filter: brightness(1.4); }

    .booking-summary { background: #111; border-radius: 10px; padding: 1rem; margin-top: 1rem; border: 1px solid var(--border); }
    .booking-summary h4 { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.5rem; }
    .booking-row { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 0.25rem; }
    .booking-total { border-top: 1px solid var(--border); padding-top: 0.5rem; margin-top: 0.5rem; font-weight: 700; }

    /* FORM */
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.35rem; }
    .form-group input { width: 100%; background: #111; border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--white); font-family: inherit; font-size: 0.9rem; outline: none; transition: border-color 0.15s; }
    .form-group input:focus { border-color: var(--red); }

    /* BUTTONS */
    .btn { padding: 10px 22px; border-radius: 8px; font-family: inherit; font-size: 0.9rem; font-weight: 600; cursor: pointer; border: none; transition: opacity 0.15s; }
    .btn-primary { background: var(--red); color: #fff; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary { background: var(--border); color: var(--white); }
    .btn-row { display: flex; gap: 0.75rem; margin-top: 1.25rem; justify-content: flex-end; }

    /* CONFIRMATION */
    .confirm-box { text-align: center; padding: 1rem 0; }
    .confirm-icon { font-size: 3rem; margin-bottom: 0.75rem; }
    .confirm-ref { font-family: monospace; font-size: 1.1rem; background: #111; padding: 8px 20px; border-radius: 8px; display: inline-block; margin: 0.5rem 0; border: 1px solid var(--red); color: var(--red); }

    /* LOADING */
    .loading { text-align: center; padding: 3rem; color: var(--muted); }
    .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 0.75rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { color: #f87171; font-size: 0.8rem; margin-top: 0.5rem; }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">🎬 BookMyShow</div>
  <div class="nav-search"><input type="text" placeholder="Search for movies, events, plays..." id="searchInput" /></div>
  <div class="nav-city">📍 <span>Coimbatore</span></div>
</nav>

<div id="health-banner"></div>

<section class="hero">
  <h1>Lights. Camera. Book.</h1>
  <p>Your gateway to the best entertainment experiences</p>
</section>

<section class="section">
  <div class="section-header">
    <h2>Now Showing</h2>
    <a>See all</a>
  </div>
  <div class="movies-grid" id="moviesGrid">
    <div class="loading"><div class="spinner"></div><br/>Loading movies...</div>
  </div>
</section>

<!-- SHOWS MODAL -->
<div class="overlay" id="showsOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="showsModalTitle">Select Show</h3>
      <button class="modal-close" onclick="closeModal('showsOverlay')">×</button>
    </div>
    <div class="modal-body" id="showsModalBody"></div>
  </div>
</div>

<!-- SEATS MODAL -->
<div class="overlay" id="seatsOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="seatsModalTitle">Select Seats</h3>
      <button class="modal-close" onclick="closeModal('seatsOverlay')">×</button>
    </div>
    <div class="modal-body" id="seatsModalBody"></div>
  </div>
</div>

<!-- CHECKOUT MODAL -->
<div class="overlay" id="checkoutOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3>Complete Booking</h3>
      <button class="modal-close" onclick="closeModal('checkoutOverlay')">×</button>
    </div>
    <div class="modal-body" id="checkoutModalBody"></div>
  </div>
</div>

<script>
const API = window.location.origin + '/api';
let selectedScreening = null, selectedSeats = [], allMovies = [];

// ── Health check ────────────────────────────────────────────
async function checkHealth() {
  const banner = document.getElementById('health-banner');
  try {
    const r = await fetch(`${API}/health`);
    const d = await r.json();
    const db = d.database === 'connected', cache = d.cache === 'connected';
    banner.className = (db && cache) ? 'ok' : 'err';
    banner.textContent = `🔗 API: OK  |  🗄️ DB: ${db?'Connected':'Error'}  |  ⚡ Cache: ${cache?'Connected':'Error'}`;
  } catch {
    banner.className = 'err';
    banner.textContent = '⚠️ Cannot reach API – is the backend running?';
  }
}

// ── Load movies ─────────────────────────────────────────────
async function loadMovies() {
  const grid = document.getElementById('moviesGrid');
  try {
    const r = await fetch(`${API}/movies`);
    const { data, source } = await r.json();
    allMovies = data || [];
    renderMovies(allMovies, source);
  } catch {
    grid.innerHTML = '<div class="loading" style="color:#f87171">⚠️ Failed to load movies. Check if the backend is running.</div>';
  }
}

function renderMovies(movies, source='') {
  const grid = document.getElementById('moviesGrid');
  if (!movies.length) { grid.innerHTML = '<div class="loading">No movies found</div>'; return; }
  grid.innerHTML = movies.map(m => `
    <div class="movie-card" onclick="openShows(${m.id}, '${esc(m.title)}')">
      <img src="${m.poster_url||'https://via.placeholder.com/300x450/1a1a1a/888?text=No+Poster'}" alt="${esc(m.title)}" loading="lazy"/>
      <div class="movie-card-body">
        <div class="movie-card-title">${esc(m.title)}</div>
        <div class="movie-card-meta">${esc(m.genre||'')} · ${m.duration} min</div>
        <div class="rating-badge">⭐ ${m.rating}</div>
      </div>
    </div>
  `).join('') + (source ? `<div style="grid-column:1/-1;font-size:0.7rem;color:var(--muted);text-align:right">Source: ${source}</div>` : '');
}

// ── Search ──────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  renderMovies(q ? allMovies.filter(m => m.title.toLowerCase().includes(q) || (m.genre||'').toLowerCase().includes(q)) : allMovies);
});

// ── Shows modal ─────────────────────────────────────────────
async function openShows(movieId, title) {
  document.getElementById('showsModalTitle').textContent = `Shows · ${title}`;
  document.getElementById('showsModalBody').innerHTML = '<div class="loading"><div class="spinner"></div><br/>Fetching shows…</div>';
  openModal('showsOverlay');
  try {
    const r = await fetch(`${API}/movies/${movieId}/shows`);
    const { data } = await r.json();
    if (!data.length) { document.getElementById('showsModalBody').innerHTML = '<p style="color:var(--muted)">No shows available for this movie.</p>'; return; }
    // Group by date, then theatre
    const byDate = {};
    data.forEach(s => {
      const date = new Date(s.show_time).toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short' });
      if (!byDate[date]) byDate[date] = {};
      if (!byDate[date][s.theatre_name]) byDate[date][s.theatre_name] = { address: s.address, shows: [] };
      byDate[date][s.theatre_name].shows.push(s);
    });
    document.getElementById('showsModalBody').innerHTML = Object.entries(byDate).slice(0,3).map(([date, theatres]) => `
      <div class="show-date-group">
        <div class="show-date-label">${date}</div>
        ${Object.entries(theatres).map(([tname, info]) => `
          <div class="theatre-block">
            <div class="theatre-name">${esc(tname)}</div>
            <div class="theatre-address">${esc(info.address||'')}</div>
            <div class="show-times">${info.shows.map(s => `
              <button class="show-time-btn" onclick="openSeats(${s.id}, '${esc(s.show_time)}', '${esc(tname)}', '${esc(title)}', ${s.price})">
                ${new Date(s.show_time).toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'})}
              </button>
            `).join('')}</div>
          </div>
        `).join('')}
      </div>
    `).join('');
  } catch {
    document.getElementById('showsModalBody').innerHTML = '<p class="error-msg">Failed to load shows.</p>';
  }
}

// ── Seats modal ─────────────────────────────────────────────
async function openSeats(screeningId, showTime, theatreName, movieTitle, basePrice) {
  selectedScreening = { id: screeningId, showTime, theatreName, movieTitle, basePrice };
  selectedSeats = [];
  closeModal('showsOverlay');
  document.getElementById('seatsModalTitle').textContent = `Pick Seats · ${movieTitle}`;
  document.getElementById('seatsModalBody').innerHTML = '<div class="loading"><div class="spinner"></div><br/>Loading seats…</div>';
  openModal('seatsOverlay');
  try {
    const r = await fetch(`${API}/screenings/${screeningId}/seats`);
    const { data } = await r.json();
    renderSeats(data);
  } catch {
    document.getElementById('seatsModalBody').innerHTML = '<p class="error-msg">Failed to load seats.</p>';
  }
}

function renderSeats(seats) {
  const rows = {};
  seats.forEach(s => { if (!rows[s.row_label]) rows[s.row_label] = []; rows[s.row_label].push(s); });
  const legend = `
    <div class="seat-legend">
      <div class="seat-legend-item"><div class="seat-dot available"></div> Available</div>
      <div class="seat-legend-item"><div class="seat-dot selected"></div> Selected</div>
      <div class="seat-legend-item"><div class="seat-dot booked"></div> Booked</div>
      <div class="seat-legend-item"><div class="seat-dot premium"></div> Premium (₹350)</div>
      <div class="seat-legend-item"><div class="seat-dot recliner"></div> Recliner (₹500)</div>
    </div>`;
  const grid = `
    <div class="seat-grid-wrapper">
      <div class="screen-label">— SCREEN THIS WAY —</div>
      ${Object.entries(rows).map(([row, rowSeats]) => `
        <div class="seat-row">
          <div class="seat-row-label">${row}</div>
          ${rowSeats.map(s => `
            <button class="seat ${s.category} ${s.is_booked?'booked':''}"
              id="seat-${s.id}" onclick="${s.is_booked?'':` toggleSeat(${s.id}, ${s.price}, '${s.category}', '${s.row_label}', ${s.seat_number})`}"
              title="${s.category} · ₹${s.price}"></button>
          `).join('')}
        </div>
      `).join('')}
    </div>`;
  const summary = `<div class="booking-summary" id="bookingSummary">
    <h4>Booking Summary</h4>
    <div id="summaryContent" style="color:var(--muted);font-size:0.85rem">Select seats to continue</div>
    <div class="btn-row"><button class="btn btn-primary" id="proceedBtn" disabled onclick="openCheckout()">Proceed to Pay</button></div>
  </div>`;
  document.getElementById('seatsModalBody').innerHTML = legend + grid + summary;
}

function toggleSeat(id, price, cat, row, num) {
  const idx = selectedSeats.findIndex(s => s.id === id);
  const el = document.getElementById(`seat-${id}`);
  if (idx === -1) {
    if (selectedSeats.length >= 8) { alert('Max 8 seats per booking'); return; }
    selectedSeats.push({ id, price, cat, label: `${row}${num}` });
    el.classList.add('selected');
  } else {
    selectedSeats.splice(idx, 1);
    el.classList.remove('selected');
  }
  updateSummary();
}

function updateSummary() {
  const total = selectedSeats.reduce((a, s) => a + Number(s.price), 0);
  const btn = document.getElementById('proceedBtn');
  const summary = document.getElementById('summaryContent');
  if (!selectedSeats.length) { summary.innerHTML = '<span style="color:var(--muted)">Select seats to continue</span>'; btn.disabled = true; return; }
  summary.innerHTML = `
    <div class="booking-row"><span>Seats: ${selectedSeats.map(s=>s.label).join(', ')}</span></div>
    <div class="booking-row booking-total"><span>Total</span><span>₹${total}</span></div>`;
  btn.disabled = false;
}

// ── Checkout modal ──────────────────────────────────────────
function openCheckout() {
  if (!selectedSeats.length) return;
  const total = selectedSeats.reduce((a, s) => a + Number(s.price), 0);
  closeModal('seatsOverlay');
  document.getElementById('checkoutModalBody').innerHTML = `
    <div class="booking-summary" style="margin-bottom:1rem">
      <div class="booking-row"><span>Movie</span><span>${esc(selectedScreening.movieTitle)}</span></div>
      <div class="booking-row"><span>Theatre</span><span>${esc(selectedScreening.theatreName)}</span></div>
      <div class="booking-row"><span>Show</span><span>${new Date(selectedScreening.showTime).toLocaleString('en-IN',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</span></div>
      <div class="booking-row"><span>Seats</span><span>${selectedSeats.map(s=>s.label).join(', ')}</span></div>
      <div class="booking-row booking-total"><span>Total</span><span>₹${total}</span></div>
    </div>
    <div class="form-group"><label>Full Name</label><input id="userName" type="text" placeholder="John Doe" /></div>
    <div class="form-group"><label>Email</label><input id="userEmail" type="email" placeholder="john@example.com" /></div>
    <div id="checkoutError" class="error-msg"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('checkoutOverlay')">Back</button>
      <button class="btn btn-primary" id="confirmBtn" onclick="confirmBooking(${total})">Confirm & Pay ₹${total}</button>
    </div>`;
  openModal('checkoutOverlay');
}

async function confirmBooking(total) {
  const name = document.getElementById('userName').value.trim();
  const email = document.getElementById('userEmail').value.trim();
  const errEl = document.getElementById('checkoutError');
  if (!name || !email) { errEl.textContent = 'Please fill in all fields.'; return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { errEl.textContent = 'Enter a valid email.'; return; }
  const btn = document.getElementById('confirmBtn'); btn.disabled = true; btn.textContent = 'Processing…';
  try {
    const r = await fetch(`${API}/bookings`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ screening_id: selectedScreening.id, seat_ids: selectedSeats.map(s=>s.id), user_name: name, user_email: email, total_amount: total })
    });
    const d = await r.json();
    if (!r.ok) { errEl.textContent = d.error || 'Booking failed. Try again.'; btn.disabled=false; btn.textContent=`Confirm & Pay ₹${total}`; return; }
    document.getElementById('checkoutModalBody').innerHTML = `
      <div class="confirm-box">
        <div class="confirm-icon">🎉</div>
        <h3>Booking Confirmed!</h3>
        <p style="color:var(--muted);margin:0.5rem 0">Your booking reference</p>
        <div class="confirm-ref">${esc(d.data.booking_ref)}</div>
        <p style="font-size:0.8rem;color:var(--muted);margin-top:0.75rem">A confirmation has been noted for <strong>${esc(email)}</strong></p>
        <div class="btn-row" style="justify-content:center;margin-top:1.5rem">
          <button class="btn btn-primary" onclick="closeModal('checkoutOverlay')">Done</button>
        </div>
      </div>`;
  } catch { errEl.textContent = 'Network error. Please try again.'; btn.disabled=false; btn.textContent=`Confirm & Pay ₹${total}`; }
}

// ── Helpers ─────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
document.querySelectorAll('.overlay').forEach(o => o.addEventListener('click', e => { if(e.target===o) o.classList.remove('open'); }));

// ── Init ────────────────────────────────────────────────────
checkHealth();
loadMovies();
